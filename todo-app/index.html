<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App - Gerenciador de Tarefas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-md">
        <div id="login-screen" class="glass-morphism p-8 rounded-2xl shadow-2xl text-white">
            <h2 class="text-3xl font-bold mb-6 text-center">Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm mb-2 text-gray-400">E-mail</label>
                    <input type="email" id="login-email" required class="w-full p-3 bg-slate-800 rounded-lg border border-slate-700 focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="mb-6">
                    <label class="block text-sm mb-2 text-gray-400">Senha</label>
                    <input type="password" id="login-senha" required class="w-full p-3 bg-slate-800 rounded-lg border border-slate-700 focus:border-blue-500 outline-none transition-all">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold transition-all mb-4">Entrar</button>
            </form>
            <p class="text-center text-sm text-gray-400">
                Não tem conta? <a href="#" onclick="showRegister()" class="text-blue-400 hover:underline">Cadastre-se</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
