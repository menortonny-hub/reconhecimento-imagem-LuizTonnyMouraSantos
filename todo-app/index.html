<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TonnyTasks — Gerenciador de Tarefas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0f172a;
      --surface:   rgba(30, 41, 59, 0.7);
      --border:    rgba(148, 163, 184, 0.12);
      --accent:    #38bdf8;
      --accent2:   #818cf8;
      --success:   #34d399;
      --danger:    #f87171;
      --text:      #e2e8f0;
      --muted:     #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glass {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .input-field {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }
    .input-field::placeholder { color: var(--muted); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0f172a;
      font-weight: 600;
      border-radius: 10px;
      padding: 0.65rem 1.4rem;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: opacity 0.2s, transform 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-ghost {
      background: rgba(148, 163, 184, 0.08);
      color: var(--muted);
      font-weight: 500;
      border-radius: 10px;
      padding: 0.65rem 1.2rem;
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: background 0.2s, color 0.2s;
    }
    .btn-ghost:hover { background: rgba(148, 163, 184, 0.15); color: var(--text); }
    .badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-trabalho { background: rgba(56, 189, 248, 0.15); color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.25); }
    .badge-pessoal  { background: rgba(129, 140, 248, 0.15); color: var(--accent2); border: 1px solid rgba(129, 140, 248, 0.25); }
    .badge-estudos  { background: rgba(52, 211, 153, 0.15); color: var(--success); border: 1px solid rgba(52, 211, 153, 0.25); }
    .task-done { opacity: 0.45; }
    .task-done .task-title { text-decoration: line-through; }
    .error-msg {
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 0.3rem;
      display: none;
    }
    .error-msg.visible { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .logo-mono {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }
    .screen { display: none; }
    .screen.active { display: flex; }
  </style>
</head>
<body>

  <!-- TELA DE LOGIN -->
  <div id="screen-login" class="screen active min-h-screen items-center justify-center p-4">
    <div class="glass w-full max-w-md p-8">
      <div class="text-center mb-8">
        <p class="logo-mono text-sky-400 mb-1">◆ TONNYTASKS</p>
        <h1 class="text-2xl font-semibold text-white">Bem-vindo de volta</h1>
        <p class="text-slate-500 text-sm mt-1">Faça login para acessar suas tarefas</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="text-xs text-slate-400 uppercase tracking-wider font-medium">E-mail</label>
          <input id="login-email" type="email" class="input-field mt-1" placeholder="seu@email.com" />
        </div>
        <div>
          <label class="text-xs text-slate-400 uppercase tracking-wider font-medium">Senha</label>
          <input id="login-senha" type="password" class="input-field mt-1" placeholder="••••••••" />
        </div>
        <p id="login-erro" class="error-msg"></p>
        <button onclick="realizarLogin()" class="btn-primary w-full justify-center mt-2">
          Entrar
        </button>
      </div>
      <div class="mt-6 text-center">
        <p class="text-slate-500 text-sm">
          Não tem conta?
          <button onclick="mostrarTela('screen-cadastro')" class="text-sky-400 hover:text-sky-300 font-medium ml-1 transition-colors">
            Criar conta
          </button>
        </p>
      </div>
    </div>
  </div>

  <!-- TELA DE CADASTRO -->
  <div id="screen-cadastro" class="screen min-h-screen items-center justify-center p-4">
    <div class="glass w-full max-w-md p-8">
      <div class="text-center mb-8">
        <p class="logo-mono text-sky-400 mb-1">◆ TONNYTASKS</p>
        <h1 class="text-2xl font-semibold text-white">Criar conta</h1>
        <p class="text-slate-500 text-sm mt-1">Preencha os dados abaixo</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="text-xs text-slate-400 uppercase tracking-wider font-medium">Nome</label>
          <input id="cad-nome" type="text" class="input-field mt-1" placeholder="Seu nome" />
        </div>
        <div>
          <label class="text-xs text-slate-400 uppercase tracking-wider font-medium">E-mail</label>
          <input id="cad-email" type="email" class="input-field mt-1" placeholder="seu@email.com" />
        </div>
        <div>
          <label class="text-xs text-slate-400 uppercase tracking-wider font-medium">Senha</label>
          <input id="cad-senha" type="password" class="input-field mt-1" placeholder="Mínimo 6 caracteres" />
        </div>
        <p id="cad-erro" class="error-msg"></p>
        <button onclick="realizarCadastro()" class="btn-primary w-full justify-center mt-2">
          Criar conta
        </button>
      </div>
      <div class="mt-6 text-center">
        <p class="text-slate-500 text-sm">
          Já tem conta?
          <button onclick="mostrarTela('screen-login')" class="text-sky-400 hover:text-sky-300 font-medium ml-1 transition-colors">
            Entrar
          </button>
        </p>
      </div>
    </div>
  </div>

  <!-- TELA DO PAINEL -->
  <div id="screen-dashboard" class="screen flex-col min-h-screen">
    <header class="glass m-4 mb-0 px-6 py-4 flex items-center justify-between rounded-2xl">
      <div class="flex items-center gap-3">
        <span class="logo-mono text-sky-400">◆ TONNYTASKS</span>
        <span class="text-slate-600">|</span>
        <p class="text-slate-300 text-sm font-medium">
          Olá, <span id="header-nome" class="text-white font-semibold"></span>
        </p>
      </div>
      <button onclick="realizarLogout()" class="btn-ghost text-sm">Sair</button>
    </header>
    <main class="flex-1 max-w-2xl w-full mx-auto px-4 py-6 space-y-6">
      <div class="glass p-6">
        <h2 class="text-lg font-semibold text-white mb-4 flex items-center gap-2">
          <span class="text-sky-400">+</span> Nova Tarefa
        </h2>
        <div class="space-y-3">
          <div>
            <input id="task-titulo" type="text" class="input-field" placeholder="Título da tarefa (obrigatório)" />
            <p id="task-erro" class="error-msg"></p>
          </div>
          <select id="task-tipo" class="input-field">
            <option value="trabalho">💼 Trabalho</option>
            <option value="pessoal">🎯 Pessoal</option>
            <option value="estudos">📚 Estudos</option>
          </select>
          <textarea id="task-desc" rows="2" class="input-field resize-none" placeholder="Descrição (opcional)"></textarea>
          <button onclick="adicionarTarefa()" class="btn-primary">Adicionar Tarefa</button>
        </div>
      </div>
      <div>
        <div class="flex items-center justify-between mb-3 px-1">
          <h2 class="text-lg font-semibold text-white">Suas Tarefas</h2>
          <span id="task-contador" class="text-xs text-slate-500 font-mono"></span>
        </div>
        <div id="lista-tarefas" class="space-y-3"></div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
