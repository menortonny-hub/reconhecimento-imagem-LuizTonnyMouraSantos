<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reconhecimento de Imagem — Vision AI</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --card:      #1a1a26;
      --border:    #2a2a40;
      --accent:    #7c5cfc;
      --accent2:   #fc5c7d;
      --text:      #e8e8f0;
      --muted:     #7070a0;
      --radius:    16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    header {
      text-align: center;
      padding: 3rem 0 2.5rem;
    }
    .site-tag {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(124,92,252,0.12);
      border: 1px solid rgba(124,92,252,0.3);
      border-radius: 100px;
      padding: 0.25rem 1rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      line-height: 1.05;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }

    .card-custom {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .cam-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    #webcam-container {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.4s;
    }
    #webcam-container.active { border-color: var(--accent); box-shadow: 0 0 32px rgba(124,92,252,0.3); }
    #webcam-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }

    .cam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
    }
    .cam-placeholder svg { opacity: 0.35; }

    .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      animation: none;
    }
    #webcam-container.active .pulse-ring {
      animation: pulse 2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(1);    opacity: 0.6; }
      100% { transform: scale(1.12); opacity: 0; }
    }

    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border: none;
      border-radius: 100px;
      padding: 0.8rem 2.2rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
      box-shadow: 0 8px 32px rgba(124,92,252,0.45);
    }
    .btn-start::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
      border-radius: inherit;
    }
    .btn-start:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(124,92,252,0.6);
    }
    .btn-start:active:not(:disabled) { transform: translateY(0); }
    .btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .labels-section { padding: 2rem; }
    .labels-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    #label-container { display: flex; flex-direction: column; gap: 1.1rem; }
    .label-item { display: flex; flex-direction: column; gap: 0.4rem; }
    .label-header { display: flex; justify-content: space-between; align-items: baseline; }
    .label-name { font-size: 0.78rem; font-weight: 500; color: var(--text); letter-spacing: 0.03em; }
    .label-pct { font-size: 0.72rem; color: var(--accent); font-weight: 500; min-width: 40px; text-align: right; transition: color 0.3s; }
    .label-pct.high { color: var(--accent2); }

    .progress-track {
      width: 100%;
      height: 8px;
      background: var(--surface);
      border-radius: 100px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.25s ease, background 0.3s;
    }
    .progress-fill.high { background: linear-gradient(90deg, var(--accent2), #ff8f6b); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      background: rgba(112,112,160,0.12);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .status-pill.live { background: rgba(124,92,252,0.12); border-color: rgba(124,92,252,0.35); color: var(--accent); }
    .status-pill.live .status-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .empty-state { text-align: center; padding: 1.5rem 0; color: var(--muted); font-size: 0.78rem; }

    footer { text-align: center; margin-top: 2.5rem; color: var(--muted); font-size: 0.7rem; letter-spacing: 0.06em; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (min-width: 640px) {
      .cam-section { flex-direction: row; align-items: center; justify-content: center; gap: 3rem; }
      .cam-controls { display: flex; flex-direction: column; align-items: flex-start; gap: 1rem; }
    }
    @media (max-width: 639px) {
      .cam-controls { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="wrapper">
    <header>
      <div class="site-tag">Teachable Machine</div>
      <h1>TONNY M. SANTOS</h1>
      <p class="subtitle">Classificação de imagem em tempo real via webcam</p>
    </header>

    <div class="card-custom">
      <div class="cam-section">
        <div id="webcam-container">
          <div class="pulse-ring"></div>
          <div class="cam-placeholder" id="cam-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" xmlns="http://www.w3.org/2000/svg">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span>Câmera inativa</span>
          </div>
        </div>

        <div class="cam-controls">
          <div class="status-pill" id="status-pill">
            <span class="status-dot"></span>
            <span id="status-text">Aguardando</span>
          </div>

          <button class="btn-start" id="start-btn" onclick="init()">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10"/>
              <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
            </svg>
            Ativar Câmera
          </button>

          <p style="font-size:0.68rem;color:var(--muted);max-width:200px;line-height:1.6;">
            Clique para conceder acesso à webcam e iniciar a classificação.
          </p>
        </div>
      </div>

      <div class="labels-section">
        <div class="labels-title">Resultado da classificação</div>
        <div id="label-container">
          <div class="empty-state">Inicie a câmera para ver as predições aqui.</div>
        </div>
      </div>
    </div>

    <footer>
      <p>Powered by <a href="https://teachablemachine.withgoogle.com/" target="_blank">Teachable Machine</a> &amp; TensorFlow.js</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/XFygIt56V/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.innerHTML = `
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" xmlns="http://www.w3.org/2000/svg" style="animation:spin 1s linear infinite">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        Carregando…`;

      if (!document.getElementById('spin-style')) {
        const s = document.createElement('style');
        s.id = 'spin-style';
        s.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
        document.head.appendChild(s);
      }

      try {
        const modelURL    = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model          = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(240, 240, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        const camContainer = document.getElementById("webcam-container");
        document.getElementById("cam-placeholder").style.display = "none";
        camContainer.appendChild(webcam.canvas);
        camContainer.classList.add("active");

        const pill = document.getElementById('status-pill');
        pill.classList.add('live');
        document.getElementById('status-text').textContent = 'Ao vivo';

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
          const item = document.createElement("div");
          item.className = "label-item";
          item.innerHTML = `
            <div class="label-header">
              <span class="label-name" id="name-${i}">Classe ${i + 1}</span>
              <span class="label-pct" id="pct-${i}">0%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="bar-${i}"></div>
            </div>`;
          labelContainer.appendChild(item);
        }

        btn.style.display = 'none';

      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = `
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
          </svg>
          Tentar novamente`;
        console.error(err);
        alert("Erro ao carregar o modelo ou a câmera. Verifique o URL e as permissões.");
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      for (let i = 0; i < maxPredictions; i++) {
        const prob   = prediction[i].probability;
        const pct    = Math.round(prob * 100);
        const isHigh = pct >= 70;

        document.getElementById(`name-${i}`).textContent = prediction[i].className;

        const pctEl = document.getElementById(`pct-${i}`);
        pctEl.textContent = pct + "%";
        pctEl.className   = "label-pct" + (isHigh ? " high" : "");

        const bar = document.getElementById(`bar-${i}`);
        bar.style.width = pct + "%";
        bar.className   = "progress-fill" + (isHigh ? " high" : "");
      }
    }
  </script>
</body>
</html>
